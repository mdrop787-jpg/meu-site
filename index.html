<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>World Cup Collection - NFT Premium</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0d0d0d;
      color: #fff;
    }
    header {
      background: linear-gradient(90deg, #111, #222);
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #ffcc00;
    }
    header h1 {
      font-size: 2.5em;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 15px #ffcc00;
    }
    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav a:hover {
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc00;
    }
    section {
      padding: 50px;
      text-align: center;
      animation: fadeIn 1.5s ease-in;
    }
    .btn {
      background: linear-gradient(90deg, #ffcc00, #fff);
      color: #000;
      padding: 15px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      background: #fff;
      color: #000;
      box-shadow: 0 0 20px #ffcc00;
    }
    .countdown {
      font-size: 2em;
      margin-top: 20px;
      color: #ffcc00;
      text-shadow: 0 0 10px #ffcc00;
    }
    .nft-card {
      background: #111;
      color: #fff;
      padding: 20px;
      margin: 15px;
      border-radius: 15px;
      width: 220px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
      animation: fadeInUp 1s ease-in;
    }
    .nft-card img {
      width: 200px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.3s;
    }
    .nft-card h3 {
      color: #ffcc00;
      font-size: 1.2em;
      margin: 10px 0;
    }
    .nft-card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 204, 0, 0.7);
    }
    .nft-card:hover img {
      box-shadow: 0 0 20px #ffcc00;
    }
    footer {
      background: #111;
      padding: 20px;
      text-align: center;
      border-top: 2px solid #ffcc00;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>World Cup Collection</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Pré-Venda</a>
      <a href="#">Mint</a>
      <a href="#">Ranking</a>
      <a href="#">Simulador</a>
      <a href="#">Perfil</a>
      <a href="#">FAQ</a>
      <a href="#">Roadmap</a>
    </nav>
  </header>

  <section>
    <h2>Pré-Venda Exclusiva</h2>
    <p>Cadastre-se para garantir acesso antecipado.</p>
    <a href="#" class="btn">Entrar na Pré-Venda</a>
    <div class="countdown" id="countdown"></div>
  </section>

  <section>
    <h2 style="color:#ffcc00;">NFTs da Coleção</h2>
    <div id="nft-gallery" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
  </section>

  <footer>
    © 2026 - World Cup Collection NFT Premium
  </footer>

  <script>
    // Cronômetro digital
    const targetDate = new Date("June 10, 2026 00:00:00").getTime();
    const countdown = document.getElementById("countdown");

    setInterval(() => {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      countdown.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }, 1000);

    // NFTs da OpenSea
    async function loadNFTs() {
      const response = await fetch(
        "https://api.opensea.io/api/v1/assets?asset_contract_address=0x08D1dADc37836b53cca8C2B199Ae517a139A771c&limit=8",
        { headers: { "Accept": "application/json" } }
      );
      const data = await response.json();
      const gallery = document.getElementById("nft-gallery");
      data.assets.forEach(nft => {
        const card = `
          <div class="nft-card">
            <img src="${nft.image_url}" alt="${nft.name}" />
            <h3>${nft.name}</h3>
            <p style="font-size:0.9em;">${nft.description || "NFT da coleção"}</p>
          </div>
        `;
        gallery.innerHTML += card;
      });
    }
    loadNFTs();
  </script>
</body>
</html>
